<!DOCTYPE html>
<html>
<head>
    <title>Azure Cloud Notes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 500px;">
        <h2 class="text-center">Azure Notes App</h2>
        <form action="/add" method="POST" class="input-group my-4">
            <input type="text" name="content" class="form-control" placeholder="New note..." required>
            <button class="btn btn-primary">Add</button>
        </form>
        <div class="list-group">
            {% for note in notes %}
            <div class="list-group-item d-flex justify-content-between align-items-center">
                {{ note.content }}
                <a href="/delete/{{ note.id }}" class="btn btn-sm btn-outline-danger">Delete</a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
